name: 'Upstream Dependency Checker'
description: 'Checks for updates in upstream repositories. Optionally tracks state via auto-merged PR.'

inputs:
  repositories:
    description: |
      JSON array of repository objects.
      Example: [{"repo": "owner/repo", "check_type": "release"}]
      check_type options: release | prerelease | commit | issue | discussion | auto (default: auto)
      For issue/discussion, include "number" field.
    required: true
  state_file:
    description: |
      Path to state file for version tracking.
      Empty = query-only mode (no commits, has_updates always false)
    required: false
    default: ''
  token:
    description: |
      GitHub token (PAT with repo scope) for API access and PR creation.
      Required for: private repos, creating PRs, avoiding rate limits.
    required: false
    default: ''
  pr_labels:
    description: 'Comma-separated labels for the PR (useful for release-drafter categorization)'
    required: false
    default: 'dependencies'
  auto_merge:
    description: 'Automatically merge the PR after creation'
    required: false
    default: 'true'
  go_mod_deps:
    description: |
      JSON array of Go module dependencies to auto-update in go.mod.
      Only processed when the corresponding repo has an update detected.
      Example: [{"repo": "XTLS/Xray-core", "module": "github.com/xtls/xray-core"}]
      Requires Go to be installed in the runner (use actions/setup-go before this action).
    required: false
    default: '[]'
  webhook_url:
    description: |
      (WIP / Reserved) Webhook URL for sending notifications.
      Currently not implemented. Reserved for future notification integration.
    required: false
    default: ''

outputs:
  results:
    description: |
      JSON array of results.
      Example: [{"repo": "owner/repo", "sha": "abc123...", "tag": "v1.0.0", "check_type": "release", "is_updated": true}]
    value: ${{ steps.check.outputs.results }}
  has_updates:
    description: |
      True only when: state_file was provided AND file existed AND content changed
    value: ${{ steps.check.outputs.has_updates }}
  is_init:
    description: 'True when this is the first run (state file did not exist)'
    value: ${{ steps.check.outputs.is_init }}
  pr_number:
    description: 'PR number if created'
    value: ${{ steps.pr.outputs.pr_number }}
  pr_url:
    description: 'PR URL if created'
    value: ${{ steps.pr.outputs.pr_url }}

runs:
  using: "composite"
  steps:
    - name: 'Check upstream repositories'
      id: check
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
        STATE_FILE: ${{ inputs.state_file }}
        REPOSITORIES: ${{ inputs.repositories }}
      run: |
        chmod +x "${{ github.action_path }}/scripts/check_repos.sh"
        "${{ github.action_path }}/scripts/check_repos.sh"

    - name: 'Update Go module dependencies'
      id: gomod
      if: steps.check.outputs.has_updates == 'true' && inputs.go_mod_deps != '[]'
      shell: bash
      env:
        RESULTS: ${{ steps.check.outputs.results }}
        GO_MOD_DEPS: ${{ inputs.go_mod_deps }}
      run: |
        chmod +x "${{ github.action_path }}/scripts/update_go_deps.sh"
        "${{ github.action_path }}/scripts/update_go_deps.sh"

    - name: 'Create and merge PR'
      id: pr
      if: (steps.check.outputs.has_updates == 'true' || steps.check.outputs.is_init == 'true') && inputs.state_file != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        STATE_FILE: ${{ inputs.state_file }}
        PR_LABELS: ${{ inputs.pr_labels }}
        AUTO_MERGE: ${{ inputs.auto_merge }}
        IS_INIT: ${{ steps.check.outputs.is_init }}
        UPDATE_SUMMARY: ${{ steps.check.outputs.update_summary }}
        INIT_SUMMARY: ${{ steps.check.outputs.init_summary }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: |
        chmod +x "${{ github.action_path }}/scripts/create_pr.sh"
        "${{ github.action_path }}/scripts/create_pr.sh"
