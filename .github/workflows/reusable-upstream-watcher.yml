# .github/workflows/reusable-upstream-watcher.yml
name: '🤖 Reusable Upstream Watcher'

on:
  workflow_call:
    inputs:
      repositories:
        description: 'JSON array of upstream repositories to monitor'
        required: true
        type: string
      state_file:
        description: 'Path to state file for version tracking'
        required: false
        type: string
        default: '.github/upstream-versions.txt'
      pr_labels:
        description: 'Comma-separated labels for the auto-created PR'
        required: false
        type: string
        default: 'chore'
      auto_merge:
        description: 'Automatically merge the PR after creation'
        required: false
        type: string
        default: 'true'
      go_mod_deps:
        description: |
          JSON array of Go module dependencies to auto-update in go.mod.
          Only processed when corresponding repo in 'repositories' has an update.
          Example: [{"repo": "XTLS/Xray-core", "module": "github.com/xtls/xray-core"}]
        required: false
        type: string
        default: '[]'
      go_version:
        description: 'Go version to use for go.mod updates. If empty, reads from go.mod.'
        required: false
        type: string
        default: ''
      dispatch_event:
        description: 'Repository dispatch event type to emit on updates'
        required: false
        type: string
        default: 'upstream-updated'
      webhook_url:
        description: '(WIP) Webhook URL for notifications. Reserved for future use.'
        required: false
        type: string
        default: ''
    secrets:
      bot_pat:
        description: 'GitHub PAT with repo scope'
        required: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: 'Setup Go (for go.mod updates)'
        if: inputs.go_mod_deps != '[]'
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: ${{ inputs.go_version || '' }}
          go-version-file: ${{ inputs.go_version == '' && 'go.mod' || '' }}

      - name: 'Run upstream checker'
        id: checker
        uses: Lanrenbang/.github/.github/actions/upstream-checker@main
        with:
          repositories: ${{ inputs.repositories }}
          state_file: ${{ inputs.state_file }}
          token: ${{ secrets.bot_pat }}
          pr_labels: ${{ inputs.pr_labels }}
          auto_merge: ${{ inputs.auto_merge }}
          go_mod_deps: ${{ inputs.go_mod_deps }}
          webhook_url: ${{ inputs.webhook_url }}

      - name: 'Trigger downstream via repository-dispatch'
        if: steps.checker.outputs.has_updates == 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4.0.1
        with:
          token: ${{ secrets.bot_pat }}
          event-type: ${{ inputs.dispatch_event }}
          client-payload: '{ "triggered_by": "upstream-watcher" }'
